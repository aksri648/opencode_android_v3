name: Build and Release APK

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build web assets
        working-directory: frontend
        run: npm run build

      - name: Sync Capacitor
        working-directory: frontend
        run: npx cap sync android

      - name: Generate debug keystore
        run: |
          keytool -genkeypair \
            -v \
            -keystore ${{ github.workspace }}/frontend/android/app/debug.keystore \
            -alias androiddebugkey \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass android \
            -keypass android \
            -dname "CN=Debug, OU=Debug, O=Debug, L=Debug, ST=Debug, C=US"

      - name: Build debug APK
        working-directory: frontend/android
        run: |
          ./gradlew assembleDebug

      - name: Rename APK
        id: rename
        run: |
          mkdir -p release
          TIMESTAMP=$(date -u +"%Y%m%d_%H%M%S")
          APK_NAME="mobileaiworkspace_${TIMESTAMP}_v0.apk"
          cp frontend/android/app/build/outputs/apk/debug/app-debug.apk "release/${APK_NAME}"
          echo "apk_name=${APK_NAME}" >> $GITHUB_OUTPUT

      - name: Determine next version
        id: version
        uses: actions/github-script@v7
        with:
          script: |
            const tagPrefix = 'v';
            let releases;
            try {
              releases = await github.rest.repos.listReleases({
                owner: context.repo.owner,
                repo: context.repo.repo,
                per_page: 100,
              });
            } catch {
              releases = { data: [] };
            }

            let maxVersion = -1;
            for (const release of releases.data) {
              if (release.tag_name && release.tag_name.startsWith(tagPrefix)) {
                const num = parseInt(release.tag_name.slice(tagPrefix.length), 10);
                if (!isNaN(num) && num > maxVersion) {
                  maxVersion = num;
                }
              }
            }

            const nextVersion = maxVersion + 1;
            core.setOutput('version', nextVersion);
            core.setOutput('tag', `${tagPrefix}${nextVersion}`);

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: "Release ${{ steps.version.outputs.tag }}"
          draft: false
          prerelease: false
          files: release/${{ steps.rename.outputs.apk_name }}
